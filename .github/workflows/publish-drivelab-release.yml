name: Publish DriveLab signed release

on:
  workflow_dispatch:
  push:
    paths:
      - '.github/release-triggers/v2.1.0'

permissions:
  contents: write

concurrency:
  group: publish-drivelab-v2.1.0
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    env:
      VERSION: '2.1.0'
      VERSION_CODE: '32'
      APK_NAME: 'DriveLab-Telem-v2.1.0.apk'
      APK_URL: 'https://license.drivelabregistration.org/v1/update/apk/DriveLab-Telem-v2.1.0.apk'
      APK_SHA256: '57f610404070d6f5deee471c531962d3d02d9397f7a73a0d5c274fcad7facbf3'
    steps:
      - name: Check out customer repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download exact production APK
        shell: bash
        run: |
          set -euo pipefail
          curl --fail --location --retry 5 --retry-all-errors \
            --output "$APK_NAME" "$APK_URL"
          printf '%s  %s\n' "$APK_SHA256" "$APK_NAME" > "$APK_NAME.sha256"
          sha256sum --check "$APK_NAME.sha256"

      - name: Create or update GitHub release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          TAG="v$VERSION"
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release edit "$TAG" \
              --title "DriveLab Telem $VERSION — RaceLink and TrackLab" \
              --notes-file RELEASE_NOTES.md \
              --latest
          else
            gh release create "$TAG" \
              --target "$GITHUB_SHA" \
              --title "DriveLab Telem $VERSION — RaceLink and TrackLab" \
              --notes-file RELEASE_NOTES.md \
              --latest
          fi
          gh release upload "$TAG" \
            "$APK_NAME" \
            "$APK_NAME.sha256" \
            "SHA256SUMS.txt" \
            --clobber

      - name: Verify release assets
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          gh release view "v$VERSION" --json tagName,name,url,assets \
            --jq '{tag: .tagName, name: .name, url: .url, assets: [.assets[].name]}'
          gh release download "v$VERSION" \
            --pattern "$APK_NAME" \
            --dir release-check
          printf '%s  %s\n' "$APK_SHA256" "release-check/$APK_NAME" | sha256sum --check

      - name: Record verified release receipt
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          mkdir -p .github/release-status
          RELEASE_URL="https://github.com/${GITHUB_REPOSITORY}/releases/tag/v${VERSION}"
          cat > ".github/release-status/v${VERSION}.txt" <<EOF
          DriveLab Telem ${VERSION} GitHub release verified
          Version code: ${VERSION_CODE}
          APK: ${APK_NAME}
          APK SHA-256: ${APK_SHA256}
          Release: ${RELEASE_URL}
          Verified by workflow run: ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}
          EOF
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add ".github/release-status/v${VERSION}.txt"
          if ! git diff --cached --quiet; then
            git commit -m "Record verified DriveLab ${VERSION} release"
            git push origin HEAD:main
          fi
